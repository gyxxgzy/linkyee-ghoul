# Site Configuration

# Theme, mapped to the directory: ./theme/xxxx
theme: default

# HTML Language setting
lang: "zh-CN"

# Plugins, implemented in ./plugins/PLUGIN_NAME
# Use {{ vars.PLUGIN_NAME }} in the settings below

# The output of the plugin can be used below, e.g., {{vars.GithubRepoStarsCountPlugin}}
plugins:

# Google Analytics tracking id
google_analytics_id:

# HTML Title
title: "Ghoul's Links"

# Avatar image path
avatar: "./images/profile.png"

# Name section text
name: "@gyxxgzy"

# Tagline section text
tagline: >-
    活着总得搞点乐子，去码头整点薯条。

# List of links
# icon: Use Font Awesome icons (https://fontawesome.com/search?o=r&m=free)
# text: The displayed text for the link
# title: The url title
# url: The URL of the link
# alt: Alternative text for accessibility
# target: `_blank` opens in a new tab, `_self` opens in the same frame
links:
  - link:
      icon: "fa-solid fa-blog"
      text: "Blog"
      url: "https://blog.gyxxgzy.com"
      alt: "Ghoul's Blog"
      title: "Ghoul's Blog"
      target: "_blank"
  - link:
      icon: "./images/notion.svg"
      text: "Notion Blog (stopped)"
      url: "https://notion.gyxxgzy.com"
      alt: "Ghoul's Notion Blog"
      title: "Ghoul's Notion Blog"
      target: "_blank"


# List of social media links
# icon: Use Font Awesome icons (https://fontawesome.com/search?o=r&m=free)
# title: The url title
# url: The URL of the social media link
# alt: Alternative text for accessibility
# target: _blank opens in a new tab, _self opens in the same frame
socials:
  - social:
      icon: "fa-brands fa-steam"
      url: "https://steamcommunity.com/id/gyxxgzy/"
      title: "Ghoul's Steam"
      alt: "Ghoul's Steam"
      target: "_blank"
  - social:
      icon: "fa-brands fa-github"
      url: "https://github.com/gyxxgzy"
      title: "Ghoul's GitHub"
      alt: "Ghoul's GitHub"
      target: "_blank"
  - social:
      icon: "fa-brands fa-bilibili"
      url: "https://space.bilibili.com/25774601"
      title: "Ghoul's bilibili"
      alt: "Ghoul's bilibili"
      target: "_blank"
  - social:
      icon: "fa-solid fa-envelope"
      url: "mailto:zyg@gyxxgzy.com"
      title: "Email: zyg@gyxxgzy.com"
      alt: "zyg@gyxxgzy.com"
      target: "_blank"

# Footer text
footer: >
    随便看看.

# Footer copyright message
# Linkyee is a 100% free, open-source project—feel free to modify the copyright message as you like. :)
copyright: >
  © 2026  <a href="https://gyxxgzy.com" target="_blank">gyxxgzy</a>. Powered by <a href="https://github.com/ZhgChgLi/linkyee" target="_blank">linkyee</a>
